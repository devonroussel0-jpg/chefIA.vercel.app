<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef IA - Cuisine Intelligente</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Ici on insère tes styles personnalisés */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0f0e0c; color: #f0ead6; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
        .app { min-height: 100vh; background: #0f0e0c; position: relative; overflow-x: hidden; }
        .noise { position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); }
        
        /* Ajoute ici le reste de tes styles si nécessaire */
        .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(32px, 5vw, 62px); color: #f0ead6; text-align: center; margin-top: 50px; }
        .hero-title em { color: #c8a96e; font-style: italic; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // On récupère les fonctions de React
        const { useState, useRef, useEffect } = React;

        // --- TON CODE REACT COMMENCE ICI ---
        function App() {
            const [count, setCount] = useState(0);

            return (
                <div className="app">
                    <div className="noise"></div>
                    <div className="hero">
                        <h1 className="hero-title">Chef <em>IA</em></h1>
                        <p style={{textAlign: 'center', color: '#7a7060'}}>L'intelligence au service de votre cuisine.</p>
                    </div>
                    
                    <main className="main" style={{marginTop: '40px', textAlign: 'center'}}>
                        <div style={{background: '#1a1815', padding: '20px', borderRadius: '16px', border: '1px solid #2e2a22'}}>
                            <p>Ton application est prête à être codée ici !</p>
                            <button 
                                onClick={() => setCount(count + 1)}
                                style={{background: '#c8a96e', color: '#0f0e0c', padding: '10px 20px', borderRadius: '8px', marginTop: '10px', fontWeight: 'bold'}}
                            >
                                Compteur : {count}
                            </button>
                        </div>
                    </main>
                </div>
            );
        }

        // Lancement de l'application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
